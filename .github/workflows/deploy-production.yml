name: Deploy Production

on:
  workflow_dispatch:
    inputs:
      image_ref:
        description: 'GHCR image ref to deploy. Leave empty to deploy ghcr.io/<owner>/<repo>:master.'
        required: false
        type: string
      source_sha:
        description: Source SHA for Sentry and release metadata. Defaults to the selected ref SHA.
        required: false
        type: string

concurrency:
  group: deploy-production
  cancel-in-progress: false

permissions:
  contents: read
  packages: read

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  prepare:
    name: Prepare Release
    runs-on: ubuntu-latest
    outputs:
      image-ref: ${{ steps.release.outputs.image-ref }}
      source-sha: ${{ steps.release.outputs.source-sha }}

    steps:
      - name: Prepare release metadata
        id: release
        shell: bash
        env:
          INPUT_IMAGE_REF: ${{ inputs.image_ref }}
          INPUT_SOURCE_SHA: ${{ inputs.source_sha }}
        run: |
          image_name="${IMAGE_NAME,,}"
          image_ref="${INPUT_IMAGE_REF}"
          source_sha="${INPUT_SOURCE_SHA}"

          if [ -z "${image_ref}" ]; then
            image_ref="${REGISTRY}/${image_name}:master"
          fi

          if [ -z "${source_sha}" ]; then
            source_sha="${GITHUB_SHA}"
          fi

          {
            echo "image-ref=${image_ref}"
            echo "source-sha=${source_sha}"
          } >> "${GITHUB_OUTPUT}"

  image-scan:
    name: Image Scan
    runs-on: ubuntu-latest
    needs: prepare

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Scan image
        uses: ./.github/actions/image-scan
        with:
          image-ref: ${{ needs.prepare.outputs.image-ref }}
          registry: ${{ env.REGISTRY }}
          registry-username: ${{ github.actor }}
          registry-password: ${{ secrets.GITHUB_TOKEN }}

  deploy-production:
    name: Deploy Production
    runs-on: ubuntu-latest
    needs:
      - prepare
      - image-scan
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Deploy with Docker Compose
        uses: ./.github/actions/remote-compose-deploy
        with:
          app-env: production
          app-name: ${{ vars.APP_NAME || vars.VITE_APP_NAME || 'Blog Frontend' }}
          api-base-url: ${{ vars.API_BASE_URL || vars.VITE_API_BASE_URL || '/api' }}
          compose-service: ${{ vars.COMPOSE_SERVICE }}
          deploy-path: ${{ vars.DEPLOY_PATH }}
          ghcr-token: ${{ secrets.GHCR_TOKEN }}
          ghcr-username: ${{ vars.GHCR_USERNAME || github.actor }}
          image-ref: ${{ needs.prepare.outputs.image-ref }}
          nginx-server-name: ${{ vars.NGINX_SERVER_NAME }}
          sentry-dsn: ${{ secrets.SENTRY_DSN || secrets.VITE_SENTRY_DSN }}
          sentry-release: ${{ needs.prepare.outputs.source-sha }}
          ssh-host: ${{ vars.SSH_HOST }}
          ssh-port: ${{ vars.SSH_PORT || '22' }}
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}
          ssh-user: ${{ vars.SSH_USER }}

      - name: Smoke test
        shell: bash
        env:
          APP_URL: ${{ vars.APP_URL }}
        run: |
          if [ -z "${APP_URL}" ]; then
            echo "::error::APP_URL is required."
            exit 1
          fi

          curl --fail --silent --show-error --retry 5 --retry-delay 10 --max-time 20 "${APP_URL}"

  release-record:
    name: Release Record
    runs-on: ubuntu-latest
    needs:
      - prepare
      - deploy-production

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Upload release record
        uses: ./.github/actions/release-record
        with:
          environment: production
          source-sha: ${{ needs.prepare.outputs.source-sha }}
          image-ref: ${{ needs.prepare.outputs.image-ref }}
          workflow-run-url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          artifact-name: production-release-metadata
