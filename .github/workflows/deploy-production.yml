name: Deploy Production

'on':
  workflow_dispatch:
    inputs:
      image_ref:
        description: 'GHCR image ref to deploy. Leave empty to deploy ghcr.io/<owner>/<repo>:master.'
        required: false
        type: string
      source_sha:
        description: 'Source SHA for Sentry and release metadata. Defaults to the selected ref SHA.'
        required: false
        type: string

concurrency:
  group: deploy-production
  cancel-in-progress: false

permissions:
  contents: read
  packages: read

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  prepare:
    name: 01 Prepare release
    runs-on: ubuntu-latest
    outputs:
      image-ref: ${{ steps.release.outputs.image-ref }}
      source-sha: ${{ steps.release.outputs.source-sha }}

    steps:
      - name: Prepare release metadata
        id: release
        shell: bash
        env:
          INPUT_IMAGE_REF: ${{ inputs.image_ref }}
          INPUT_SOURCE_SHA: ${{ inputs.source_sha }}
        run: |
          image_name="${IMAGE_NAME,,}"
          image_ref="${INPUT_IMAGE_REF}"
          source_sha="${INPUT_SOURCE_SHA}"

          if [ -z "${image_ref}" ]; then
            image_ref="${REGISTRY}/${image_name}:master"
          fi

          if [ -z "${source_sha}" ]; then
            source_sha="${GITHUB_SHA}"
          fi

          {
            echo "image-ref=${image_ref}"
            echo "source-sha=${source_sha}"
          } >> "${GITHUB_OUTPUT}"

  image-scan:
    name: 02 Image security scan
    runs-on: ubuntu-latest
    needs: prepare

    steps:
      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ needs.prepare.outputs.image-ref }}
          format: table
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: os,library
          severity: HIGH,CRITICAL

  deploy-production:
    name: 03 Deploy production
    runs-on: ubuntu-latest
    needs:
      - prepare
      - image-scan
    environment: production

    steps:
      - name: Configure SSH
        shell: bash
        env:
          SSH_HOST: ${{ vars.SSH_HOST }}
          SSH_PORT: ${{ vars.SSH_PORT }}
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${SSH_PRIVATE_KEY}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "${SSH_PORT:-22}" "${SSH_HOST}" >> ~/.ssh/known_hosts

      - name: Deploy with docker compose
        shell: bash
        env:
          APP_ENV: production
          APP_NAME: ${{ vars.APP_NAME || vars.VITE_APP_NAME || 'Blog Frontend' }}
          API_BASE_URL: ${{ vars.API_BASE_URL || vars.VITE_API_BASE_URL || '/api' }}
          COMPOSE_SERVICE: ${{ vars.COMPOSE_SERVICE }}
          DEPLOY_PATH: ${{ vars.DEPLOY_PATH }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          GHCR_USERNAME: ${{ vars.GHCR_USERNAME }}
          IMAGE_REF: ${{ needs.prepare.outputs.image-ref }}
          SENTRY_DSN: ${{ secrets.SENTRY_DSN || secrets.VITE_SENTRY_DSN }}
          SENTRY_RELEASE: ${{ needs.prepare.outputs.source-sha }}
          SSH_HOST: ${{ vars.SSH_HOST }}
          SSH_PORT: ${{ vars.SSH_PORT }}
          SSH_USER: ${{ vars.SSH_USER }}
        run: |
          remote_env=$(
            printf "DEPLOY_PATH=%q COMPOSE_SERVICE=%q IMAGE_REF=%q APP_NAME=%q APP_ENV=%q API_BASE_URL=%q SENTRY_DSN=%q SENTRY_RELEASE=%q" \
              "${DEPLOY_PATH}" "${COMPOSE_SERVICE}" "${IMAGE_REF}" "${APP_NAME}" "${APP_ENV}" "${API_BASE_URL}" "${SENTRY_DSN}" "${SENTRY_RELEASE}"
          )
          ghcr_username="${GHCR_USERNAME:-${GITHUB_ACTOR}}"
          ghcr_username_arg=$(printf '%q' "${ghcr_username}")

          if [ -n "${GHCR_TOKEN}" ]; then
            printf '%s' "${GHCR_TOKEN}" | ssh -i ~/.ssh/deploy_key -p "${SSH_PORT:-22}" "${SSH_USER}@${SSH_HOST}" \
              "docker login ghcr.io -u ${ghcr_username_arg} --password-stdin"
          fi

          ssh -i ~/.ssh/deploy_key -p "${SSH_PORT:-22}" "${SSH_USER}@${SSH_HOST}" "${remote_env} bash -s" <<'EOF'
          set -euo pipefail

          cd "${DEPLOY_PATH}"

          export IMAGE_REF APP_NAME APP_ENV API_BASE_URL SENTRY_DSN SENTRY_RELEASE

          docker compose pull "${COMPOSE_SERVICE}"
          docker compose up -d "${COMPOSE_SERVICE}"
          docker compose ps "${COMPOSE_SERVICE}"
          docker image prune -f
          EOF

  smoke-production:
    name: 04 Production smoke test
    runs-on: ubuntu-latest
    needs: deploy-production
    environment: production

    steps:
      - name: Check production URL
        env:
          APP_URL: ${{ vars.APP_URL }}
        run: |
          curl --fail --silent --show-error --retry 5 --retry-delay 10 --max-time 20 "${APP_URL}"

  release-record:
    name: 05 Production release record
    runs-on: ubuntu-latest
    needs:
      - prepare
      - smoke-production

    steps:
      - name: Write release metadata
        shell: bash
        run: |
          cat > release-metadata.json <<EOF
          {
            "environment": "production",
            "source_sha": "${{ needs.prepare.outputs.source-sha }}",
            "image": "${{ needs.prepare.outputs.image-ref }}",
            "workflow_run_url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}",
            "deployed_at": "$(date -u +"%Y-%m-%dT%H:%M:%SZ")"
          }
          EOF

          {
            echo "### Production Release Record"
            echo
            echo "| Field | Value |"
            echo "| --- | --- |"
            echo "| Environment | \`production\` |"
            echo "| Source SHA | \`${{ needs.prepare.outputs.source-sha }}\` |"
            echo "| Image | \`${{ needs.prepare.outputs.image-ref }}\` |"
            echo "| Workflow | ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }} |"
          } >> "${GITHUB_STEP_SUMMARY}"

      - name: Upload release metadata
        uses: actions/upload-artifact@v7
        with:
          name: production-release-metadata
          path: release-metadata.json
          retention-days: 90
