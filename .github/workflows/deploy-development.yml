name: Deploy Development

on:
  workflow_run:
    workflows: ['CI']
    branches: [master]
    types: [completed]

concurrency:
  group: deploy-development-${{ github.event.workflow_run.head_sha }}
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_TAG: ${{ github.event.workflow_run.head_sha }}

jobs:
  docker-image:
    name: Docker Image
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push'
    outputs:
      digest: ${{ steps.image.outputs.digest }}
      image-ref: ${{ steps.image.outputs.image-ref }}

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Build and push image
        id: image
        uses: ./.github/actions/docker-image
        with:
          registry: ${{ env.REGISTRY }}
          image-name: ${{ github.repository }}
          image-tag: ${{ env.IMAGE_TAG }}
          latest-tag: master
          registry-username: ${{ github.actor }}
          registry-password: ${{ secrets.GITHUB_TOKEN }}
          vite-app-name: Blog Frontend
          vite-app-env: production
          vite-api-base-url: /api
          vite-sentry-dsn: ''
          vite-sentry-release: ${{ github.event.workflow_run.head_sha }}
          vite-sourcemap: 'true'
          sentry-org: ${{ vars.SENTRY_ORG }}
          sentry-project: ${{ vars.SENTRY_PROJECT }}
          sentry-release: ${{ github.event.workflow_run.head_sha }}
          sentry-auth-token: ${{ secrets.SENTRY_AUTH_TOKEN }}

  image-scan:
    name: Image Scan
    runs-on: ubuntu-latest
    needs: docker-image

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Scan image
        uses: ./.github/actions/image-scan
        with:
          image-ref: ${{ needs.docker-image.outputs.image-ref }}
          registry: ${{ env.REGISTRY }}
          registry-username: ${{ github.actor }}
          registry-password: ${{ secrets.GITHUB_TOKEN }}

  deploy-development:
    name: Deploy Development
    runs-on: [self-hosted, linux, blog-development]
    needs:
      - docker-image
      - image-scan
    environment: development

    steps:
      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Deploy with Docker Compose
        shell: bash
        env:
          APP_ENV: development
          APP_NAME: ${{ vars.APP_NAME || 'Blog Frontend' }}
          API_BASE_URL: ${{ vars.API_BASE_URL || '/api' }}
          COMPOSE_SERVICE: ${{ vars.COMPOSE_SERVICE }}
          DEPLOY_PATH: ${{ vars.DEPLOY_PATH }}
          IMAGE_REF: ${{ needs.docker-image.outputs.image-ref }}
          NGINX_SERVER_NAME: ${{ vars.NGINX_SERVER_NAME }}
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          SENTRY_RELEASE: ${{ github.event.workflow_run.head_sha }}
        run: |
          failed=0

          check_required() {
            name="$1"
            value="$2"

            if [ -z "${value}" ]; then
              echo "::error::${name} is required."
              failed=1
            fi
          }

          check_required COMPOSE_SERVICE "${COMPOSE_SERVICE}"
          check_required DEPLOY_PATH "${DEPLOY_PATH}"
          check_required IMAGE_REF "${IMAGE_REF}"

          if [ "${failed}" -ne 0 ]; then
            exit "${failed}"
          fi

          cd "${DEPLOY_PATH}"

          export IMAGE_REF APP_NAME APP_ENV API_BASE_URL NGINX_SERVER_NAME SENTRY_DSN SENTRY_RELEASE

          docker compose pull "${COMPOSE_SERVICE}"
          docker compose up -d "${COMPOSE_SERVICE}"
          docker compose ps "${COMPOSE_SERVICE}"
          docker image prune -f

      - name: Smoke test
        shell: bash
        env:
          APP_URL: ${{ vars.APP_URL }}
        run: |
          if [ -z "${APP_URL}" ]; then
            echo "::error::APP_URL is required."
            exit 1
          fi

          curl --fail --silent --show-error --retry 5 --retry-delay 10 --max-time 20 "${APP_URL}"

  release-record:
    name: Release Record
    runs-on: ubuntu-latest
    needs:
      - docker-image
      - deploy-development

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Upload release record
        uses: ./.github/actions/release-record
        with:
          environment: development
          source-sha: ${{ github.event.workflow_run.head_sha }}
          image-ref: ${{ needs.docker-image.outputs.image-ref }}
          digest: ${{ needs.docker-image.outputs.digest }}
          workflow-run-url: ${{ github.event.workflow_run.html_url }}
          artifact-name: development-release-metadata
