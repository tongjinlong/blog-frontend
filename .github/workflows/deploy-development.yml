name: Deploy Development

on:
  workflow_run:
    workflows: ['CI']
    branches: [master]
    types: [completed]

concurrency:
  group: deploy-development-${{ github.event.workflow_run.head_sha }}
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_TAG: ${{ github.event.workflow_run.head_sha }}

jobs:
  docker-image:
    name: Docker Image
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push'
    outputs:
      digest: ${{ steps.image.outputs.digest }}
      image-ref: ${{ steps.image.outputs.image-ref }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Build and push image
        id: image
        uses: ./.github/actions/docker-image
        with:
          registry: ${{ env.REGISTRY }}
          image-name: ${{ github.repository }}
          image-tag: ${{ env.IMAGE_TAG }}
          latest-tag: master
          registry-username: ${{ github.actor }}
          registry-password: ${{ secrets.GITHUB_TOKEN }}
          vite-app-name: Blog Frontend
          vite-app-env: production
          vite-api-base-url: /api
          vite-sentry-dsn: ''
          vite-sentry-release: ${{ github.event.workflow_run.head_sha }}
          vite-sourcemap: 'true'
          sentry-org: ${{ vars.SENTRY_ORG }}
          sentry-project: ${{ vars.SENTRY_PROJECT }}
          sentry-release: ${{ github.event.workflow_run.head_sha }}
          sentry-auth-token: ${{ secrets.SENTRY_AUTH_TOKEN }}

  image-scan:
    name: Image Scan
    runs-on: ubuntu-latest
    needs: docker-image

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Scan image
        uses: ./.github/actions/image-scan
        with:
          image-ref: ${{ needs.docker-image.outputs.image-ref }}
          registry: ${{ env.REGISTRY }}
          registry-username: ${{ github.actor }}
          registry-password: ${{ secrets.GITHUB_TOKEN }}

  deploy-development:
    name: Deploy Development
    runs-on: ubuntu-latest
    needs:
      - docker-image
      - image-scan
    environment: development

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Deploy with Docker Compose
        uses: ./.github/actions/remote-compose-deploy
        with:
          app-env: development
          app-name: ${{ vars.APP_NAME || 'Blog Frontend' }}
          api-base-url: ${{ vars.API_BASE_URL || '/api' }}
          compose-service: ${{ vars.COMPOSE_SERVICE }}
          deploy-path: ${{ vars.DEPLOY_PATH }}
          ghcr-token: ${{ secrets.GHCR_TOKEN }}
          ghcr-username: ${{ vars.GHCR_USERNAME || github.actor }}
          image-ref: ${{ needs.docker-image.outputs.image-ref }}
          nginx-server-name: ${{ vars.NGINX_SERVER_NAME }}
          sentry-dsn: ${{ secrets.SENTRY_DSN }}
          sentry-release: ${{ github.event.workflow_run.head_sha }}
          ssh-host: ${{ vars.SSH_HOST }}
          ssh-port: ${{ vars.SSH_PORT || '22' }}
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}
          ssh-user: ${{ vars.SSH_USER }}

      - name: Smoke test
        shell: bash
        env:
          APP_URL: ${{ vars.APP_URL }}
        run: |
          if [ -z "${APP_URL}" ]; then
            echo "::error::APP_URL is required."
            exit 1
          fi

          curl --fail --silent --show-error --retry 5 --retry-delay 10 --max-time 20 "${APP_URL}"

  release-record:
    name: Release Record
    runs-on: ubuntu-latest
    needs:
      - docker-image
      - deploy-development

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Upload release record
        uses: ./.github/actions/release-record
        with:
          environment: development
          source-sha: ${{ github.event.workflow_run.head_sha }}
          image-ref: ${{ needs.docker-image.outputs.image-ref }}
          digest: ${{ needs.docker-image.outputs.digest }}
          workflow-run-url: ${{ github.event.workflow_run.html_url }}
          artifact-name: development-release-metadata
