name: Release Notes

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  release-please:
    name: Release Please
    runs-on: ubuntu-latest

    steps:
      - name: Create or update release PR
        uses: googleapis/release-please-action@v4
        with:
          release-type: node
