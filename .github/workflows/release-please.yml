name: Release Notes

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    name: Release Please
    runs-on: ubuntu-latest

    steps:
      - name: Create or update release PR
        uses: googleapis/release-please-action@v5
        with:
          package-name: blog-frontend
          release-type: node
