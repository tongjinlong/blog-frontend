name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

jobs:
  policy:
    name: Policy
    runs-on: ubuntu-latest

    steps:
      - name: Validate branch name
        shell: bash
        run: |
          branch="${GITHUB_HEAD_REF:-${GITHUB_REF_NAME}}"
          pattern='^(master|main|dependabot/.+|renovate/.+|(feat|fix|chore|docs|style|refactor|perf|test|ci|build|revert|hotfix|release)/[a-z0-9][a-z0-9._/-]*)$'

          if [[ ! "$branch" =~ $pattern ]]; then
            echo "Invalid branch name: $branch"
            echo "Use one of: feat/*, fix/*, chore/*, docs/*, style/*, refactor/*, perf/*, test/*, ci/*, build/*, hotfix/*, release/*, dependabot/*."
            exit 1
          fi

      - name: Checkout
        if: github.event_name == 'pull_request'
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup pnpm and Node
        if: github.event_name == 'pull_request'
        uses: ./.github/actions/setup-pnpm-node

      - name: Validate commit messages
        if: github.event_name == 'pull_request'
        run: |
          pnpm exec commitlint \
            --from "${{ github.event.pull_request.base.sha }}" \
            --to "${{ github.event.pull_request.head.sha }}" \
            --verbose

  quality:
    name: Quality
    runs-on: ubuntu-latest
    needs: policy

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm and Node
        uses: ./.github/actions/setup-pnpm-node

      - name: Check formatting
        run: pnpm format:check

      - name: Lint scripts
        run: pnpm lint

      - name: Lint styles
        run: pnpm stylelint

      - name: Type check
        run: pnpm typecheck

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: quality

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm and Node
        uses: ./.github/actions/setup-pnpm-node

      - name: Run unit tests with coverage
        run: pnpm test:coverage

      - name: Upload coverage report
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: unit-tests
    env:
      BUNDLE_MAX_ASSET_GZIP_KB: 350
      BUNDLE_MAX_TOTAL_GZIP_KB: 900

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm and Node
        uses: ./.github/actions/setup-pnpm-node

      - name: Check circular dependencies
        run: pnpm check:circular

      - name: Build
        run: pnpm build

      - name: Check bundle size
        run: pnpm check:bundle

      - name: Upload bundle visualizer
        uses: actions/upload-artifact@v7
        with:
          name: bundle-stats
          path: dist/stats.html
          if-no-files-found: ignore
          retention-days: 7

  e2e:
    name: E2E
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm and Node
        uses: ./.github/actions/setup-pnpm-node

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Run E2E
        run: pnpm test:e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  docker-build-check:
    name: Docker Build Check
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build image without push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          push: false
          tags: blog-frontend:pr-${{ github.event.pull_request.number }}
          build-args: |
            VITE_APP_NAME=Blog Frontend
            VITE_APP_ENV=production
            VITE_API_BASE_URL=/api
            VITE_SOURCEMAP=false
