name: PR Checks

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  issues: write
  pull-requests: read

jobs:
  branch-name:
    name: 01 Branch name
    runs-on: ubuntu-latest

    steps:
      - name: Validate branch name
        shell: bash
        run: |
          branch="${GITHUB_HEAD_REF:-${GITHUB_REF_NAME}}"
          pattern='^(master|main|dependabot/.+|renovate/.+|(feat|fix|chore|docs|style|refactor|perf|test|ci|build|revert|hotfix|release)/[a-z0-9][a-z0-9._/-]*)$'

          if [[ ! "$branch" =~ $pattern ]]; then
            echo "Invalid branch name: $branch"
            echo "Use one of: feat/*, fix/*, chore/*, docs/*, style/*, refactor/*, perf/*, test/*, ci/*, build/*, hotfix/*, release/*, dependabot/*."
            exit 1
          fi

  commit-messages:
    name: 02 Commit messages
    runs-on: ubuntu-latest
    needs: branch-name

    steps:
      - name: Skip commit message check outside pull requests
        if: github.event_name != 'pull_request'
        run: echo "Commit message checks run on pull requests."

      - name: Checkout
        if: github.event_name == 'pull_request'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm and Node
        if: github.event_name == 'pull_request'
        uses: ./.github/actions/setup-pnpm-node

      - name: Validate commit messages
        if: github.event_name == 'pull_request'
        run: |
          pnpm exec commitlint \
            --from "${{ github.event.pull_request.base.sha }}" \
            --to "${{ github.event.pull_request.head.sha }}" \
            --verbose

  basic-checks:
    name: 03 Basic checks
    runs-on: ubuntu-latest
    needs: commit-messages

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm and Node
        uses: ./.github/actions/setup-pnpm-node

      - name: Check formatting
        run: pnpm format:check

      - name: Lint scripts
        run: pnpm lint

      - name: Lint styles
        run: pnpm stylelint

      - name: Type check
        run: pnpm typecheck

  unit-coverage:
    name: 04 Unit tests and coverage
    runs-on: ubuntu-latest
    needs: basic-checks

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm and Node
        uses: ./.github/actions/setup-pnpm-node

      - name: Run unit tests with coverage
        run: pnpm test:coverage

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

      - name: Comment coverage report
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
        continue-on-error: true
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs')

            const summaryPath = 'coverage/coverage-summary.json'

            if (!fs.existsSync(summaryPath)) {
              core.warning(`Coverage summary not found at ${summaryPath}`)
              return
            }

            const summary = JSON.parse(fs.readFileSync(summaryPath, 'utf8')).total
            const format = (metric) => {
              const item = summary[metric]
              return `${item.pct}% (${item.covered}/${item.total})`
            }

            const marker = '<!-- coverage-report -->'
            const body = `${marker}
            ### Coverage Report

            | Metric | Coverage |
            | --- | ---: |
            | Statements | ${format('statements')} |
            | Branches | ${format('branches')} |
            | Functions | ${format('functions')} |
            | Lines | ${format('lines')} |
            `

            const { owner, repo } = context.repo
            const issue_number = context.issue.number
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
              per_page: 100
            })
            const previous = comments.find((comment) => {
              return comment.user.type === 'Bot' && comment.body?.includes(marker)
            })

            if (previous) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: previous.id,
                body
              })
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body
              })
            }

  build:
    name: 05 Build
    runs-on: ubuntu-latest
    needs: unit-coverage
    env:
      BUNDLE_MAX_ASSET_GZIP_KB: 350
      BUNDLE_MAX_TOTAL_GZIP_KB: 900

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm and Node
        uses: ./.github/actions/setup-pnpm-node

      - name: Check circular dependencies
        run: pnpm check:circular

      - name: Build
        run: pnpm build

      - name: Check bundle size
        run: pnpm check:bundle

      - name: Upload bundle visualizer
        uses: actions/upload-artifact@v4
        with:
          name: bundle-stats
          path: dist/stats.html
          if-no-files-found: ignore
          retention-days: 7

  e2e:
    name: 06 E2E
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm and Node
        uses: ./.github/actions/setup-pnpm-node

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Run E2E
        run: pnpm test:e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  secret-scan:
    name: 07 Secret scan
    runs-on: ubuntu-latest
    needs: e2e

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  docker-build-check:
    name: 08 Docker build check
    runs-on: ubuntu-latest
    needs: secret-scan
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image without push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: false
          tags: blog-frontend:pr-${{ github.event.pull_request.number }}
          build-args: |
            VITE_APP_NAME=Blog Frontend
            VITE_APP_ENV=production
            VITE_API_BASE_URL=/api
            VITE_SOURCEMAP=false
