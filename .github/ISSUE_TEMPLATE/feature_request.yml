name: Feature request
description: 提出一个功能或体验改进
title: 'feat: '
labels: ['enhancement']
body:
  - type: textarea
    id: problem
    attributes:
      label: 背景或问题
      description: 这个需求想解决什么问题？
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: 期望方案
      description: 你希望最终是什么样的体验？
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: 其他方案
      description: 可选。已经考虑过但暂时不采用的方案。
  - type: textarea
    id: context
    attributes:
      label: 补充信息
      description: 截图、链接、上下文都可以放这里。
