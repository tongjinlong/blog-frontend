name: Bug report
description: 报告一个可复现的问题
title: 'fix: '
labels: ['bug']
body:
  - type: textarea
    id: summary
    attributes:
      label: 问题描述
      description: 简要说明出现了什么问题。
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: 复现步骤
      description: 写出从打开页面到触发问题的步骤。
      placeholder: |
        1. 打开 ...
        2. 点击 ...
        3. 看到 ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: 期望表现
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: 实际表现
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: 环境
      placeholder: Chrome 126 / macOS / production
