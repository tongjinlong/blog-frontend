version: 2
updates:
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'monthly'
      time: '09:00'
      timezone: 'Asia/Shanghai'
    open-pull-requests-limit: 3
    commit-message:
      prefix: 'build(deps)'
      prefix-development: 'build(deps-dev)'
      include: 'scope'
    groups:
      minor-and-patch:
        update-types: ['minor', 'patch']
      major:
        update-types: ['major']
  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'monthly'
      time: '09:30'
      timezone: 'Asia/Shanghai'
    open-pull-requests-limit: 1
    commit-message:
      prefix: 'ci'
      include: 'scope'
    groups:
      github-actions:
        patterns: ['*']
